<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght=700&family=Inter:wght=700;900&display=swap');
        body { background: transparent; margin: 0; overflow: hidden; font-family: 'Oswald', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; perspective: 2000px; }
        #table-stage { position: relative; width: 1200px; height: 600px; display: none; }
        
        /* Contenedor central de la ruleta de Killers */
        #killer-stage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; display: none; z-index: 999; }
        
        /* Clase base de la carta de la ruleta */
        .killer-shuffle-card { position: absolute; width: 190px; height: 275px; left: 50%; top: 50%; transform: translate(-50%, -50%); transform-style: preserve-3d; transition: all 0.2s ease-out; }
        
        /* Animación activa de barajado físico salvaje */
        .killer-shuffle-card.shuffling {
            animation: cardShuffleEffect 0.25s infinite alternate ease-in-out;
        }

        /* Modificación para que la carta ganadora use la transición de volteo (flip) nativa */
        .killer-shuffle-card.winner-reveal {
            transform: translate(-50%, -50%) scale(1.15) rotateY(0deg);
            transition: transform 1.1s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1050;
        }

        /* Cuando se le aplica el volteo final en el centro */
        .killer-shuffle-card.winner-reveal.flipped {
            transform: translate(-50%, -50%) scale(1.15) rotateY(180deg);
        }

        @keyframes cardShuffleEffect {
            0% { transform: translate(-50%, -50%) rotate(var(--r1)) translate(var(--x1), var(--y1)) scale(0.95); }
            100% { transform: translate(-50%, -50%) rotate(var(--r2)) translate(var(--x2), var(--y2)) scale(1.02); }
        }

        .card { position: absolute; width: 190px; height: 275px; left: 50%; top: 50%; transform-style: preserve-3d; transition: all 1.1s cubic-bezier(0.25, 1, 0.5, 1); }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 14px; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(0,0,0,0.6); }
        .back { background: #0b0b0c; border: 6px solid #a855f7; color: #ffffff; font-size: 85px; font-weight: 900; position: relative; overflow: hidden; }
        .dbd-logo-bg { position: absolute; width: 85%; height: 85%; opacity: 0.35; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1; }
        .dbd-logo-bg img { width: 100%; height: 100%; object-fit: contain; }
        .back-letter { position: relative; z-index: 2; text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.95), 0px 0px 10px rgba(168, 85, 247, 0.6); }
        .front { background: #09090b; border: 5px solid #a855f7; transform: rotateY(180deg); flex-direction: column; padding: 12px; box-sizing: border-box; }
        
        /* --- ESTILOS PARA EL EFECTO DE IMPACTO MORADO --- */
        .killer-glow-burst {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.7) 0%, rgba(168, 85, 247, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            animation: burstGlowAnim 0.8s ease-out forwards;
        }

        .burst-particle {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--size);
            height: var(--size);
            background: #c084fc;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1060;
            box-shadow: 0 0 12px #a855f7, 0 0 20px #a855f7;
            transform: translate(-50%, -50%);
            animation: particleFly var(--dur) cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes burstGlowAnim {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
        }

        @keyframes particleFly {
            0% { transform: translate(-50%, -50%) translate(0, 0) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Pilas iniciales de Perks / Pilas de Votación */
        .pile-A-0 { transform: translate(-250%, -50%) translate(0px, 0px); z-index: 1; }
        .pile-A-1 { transform: translate(-250%, -50%) translate(4px, -4px); z-index: 2; }
        .pile-A-2 { transform: translate(-250%, -50%) translate(8px, -8px); z-index: 3; }
        .pile-A-3 { transform: translate(-250%, -50%) translate(12px, -12px); z-index: 4; }
        
        .pile-B-0 { transform: translate(-50%, -50%) translate(0px, 0px); z-index: 10; }
        .pile-B-1 { transform: translate(-50%, -50%) translate(4px, -4px); z-index: 11; }
        .pile-B-2 { transform: translate(-50%, -50%) translate(8px, -8px); z-index: 12; }
        .pile-B-3 { transform: translate(-50%, -50%) translate(12px, -12px); z-index: 13; }
        
        .pile-C-0 { transform: translate(150%, -50%) translate(0px, 0px); z-index: 20; }
        .pile-C-1 { transform: translate(150%, -50%) translate(4px, -4px); z-index: 21; }
        .pile-C-2 { transform: translate(150%, -50%) translate(8px, -8px); z-index: 22; }
        .pile-C-3 { transform: translate(150%, -50%) translate(12px, -12px); z-index: 23; }

        /* Muestra la carta dada vuelta boca arriba (180deg) en su mazo correspondiente durante la votación de Killers */
        .pile-vote-visible-A { transform: translate(-250%, -50%) rotateY(180deg); z-index: 30; }
        .pile-vote-visible-B { transform: translate(-50%, -50%) rotateY(180deg); z-index: 31; }
        .pile-vote-visible-C { transform: translate(150%, -50%) rotateY(180deg); z-index: 32; }
        
        /* Posiciones extendidas ganadoras */
        .reveal-0 { transform: translate(-230%, -50%) rotateY(180deg); z-index: 50; }
        .reveal-1 { transform: translate(-110%, -50%) rotateY(180deg); z-index: 51; }
        .reveal-2 { transform: translate(10%, -50%) rotateY(180deg); z-index: 52; }
        .reveal-3 { transform: translate(130%, -50%) rotateY(180deg); z-index: 53; }

        /* Posición para la carta única ganadora del Killer Votado */
        .reveal-killer-win { transform: translate(-50%, -50%) scale(1.25) rotateY(180deg); z-index: 100; }
        
        .perk-icon-large { width: 125px; height: 125px; background: #1c0e30; transform: rotate(45deg); border: 3px solid #a855f7; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 15px; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .perk-icon-large img { width: 105%; height: 105%; transform: rotate(-45deg); object-fit: contain; }
        .perk-title-large { color: white; font-size: 15px; text-align: center; margin-top: 35px; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'Inter'; font-weight: 900; line-height: 1.2; padding: 0 5px; }
        .votos-tag { position: absolute; bottom: -50px; color: white; font-size: 22px; width: 100%; text-align: center; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div id="table-stage"></div>
    <div id="killer-stage"></div>
    
    <audio id="snd-flip" src="sounds/card-flip.mp3" preload="auto"></audio>
    <audio id="snd-tick" src="sounds/roulette-tick.mp3" preload="auto"></audio>
    <audio id="snd-burst" src="sounds/burst.mp3" preload="auto"></audio>
    <audio id="snd-win" src="sounds/win-perks.mp3" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    firebase.initializeApp({databaseURL: "https://dbd-overlay-default-rtdb.firebaseio.com"});
    const stage = document.getElementById('table-stage');
    const kStage = document.getElementById('killer-stage');
    
    const sndFlip = document.getElementById('snd-flip');
    const sndTick = document.getElementById('snd-tick');
    const sndBurst = document.getElementById('snd-burst');
    const sndWin = document.getElementById('snd-win');

    function playSound(audioNode, volume = 1.0) {
        if (!audioNode) return;
        audioNode.volume = volume;
        audioNode.currentTime = 0; 
        audioNode.play().catch(e => console.log("Audio pausado:", e));
    }

    function limpiarNombreRuta(name) {
        if (!name) return "";
        return name.toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") 
            .replace(/¡/g, "").replace(/!/g, "").replace(/:/g, "") 
            .replace(/, /g, "_")             
            .replace(/ /g, "_")              
            .trim();
    }
    
    function getPerkUrl(name) { return "imag/perks/" + limpiarNombreRuta(name) + ".png"; }
    function getKillerUrl(name) { return "imag/killers/" + limpiarNombreRuta(name) + ".png"; }

    function crearCartaBarajado(nombreKiller, index, total) {
        const card = document.createElement('div');
        card.className = 'killer-shuffle-card shuffling';
        card.id = `k-card-${index}`;
        
        const r1 = (Math.random() * 24 - 12) + "deg";
        const r2 = (Math.random() * 24 - 12) + "deg";
        const x1 = (Math.random() * 40 - 20) + "px";
        const x2 = (Math.random() * 40 - 20) + "px";
        const y1 = (Math.random() * 30 - 15) + "px";
        const y2 = (Math.random() * 30 - 15) + "px";
        
        card.style.setProperty('--r1', r1); card.style.setProperty('--r2', r2);
        card.style.setProperty('--x1', x1); card.style.setProperty('--x2', x2);
        card.style.setProperty('--y1', y1); card.style.setProperty('--y2', y2);
        
        card.style.zIndex = index;

        card.innerHTML = `
            <div class="side back">
                <div class="dbd-logo-bg"><img src="imag/dbd.png"></div>
                <span class="back-letter" style="font-size:50px;">💀</span>
            </div>
            <div class="side front">
                <div class="perk-icon-large"><img src="${getKillerUrl(nombreKiller)}" onerror="this.src='imag/dbd.png'"></div>
                <div class="perk-title-large">${nombreKiller}</div>
            </div>
        `;
        return card;
    }

    function dispararEfectoMorado() {
        const glow = document.createElement('div');
        glow.className = 'killer-glow-burst';
        kStage.appendChild(glow);
        setTimeout(() => glow.remove(), 800);

        playSound(sndBurst, 0.85);

        const totalParticulas = 35;
        for (let i = 0; i < totalParticulas; i++) {
            const p = document.createElement('div');
            p.className = 'burst-particle';
            
            const angulo = Math.random() * Math.PI * 2;
            const distancia = 120 + Math.random() * 180; 
            const tx = (Math.cos(angulo) * distancia) + "px";
            const ty = (Math.sin(angulo) * distancia) + "px";
            
            const size = (4 + Math.random() * 8) + "px";
            const duracion = (0.4 + Math.random() * 0.4) + "s";
            
            p.style.setProperty('--tx', tx);
            p.style.setProperty('--ty', ty);
            p.style.setProperty('--size', size);
            p.style.setProperty('--dur', duracion);
            
            kStage.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }

    function reproducirSonidoKiller(nombreKiller) {
        const nombreLimpio = limpiarNombreRuta(nombreKiller);
        const sndKillerPersonalizado = new Audio(`sounds/killers/${nombreLimpio}.mp3`);
        
        sndKillerPersonalizado.addEventListener('error', () => {
            playSound(sndWin, 0.8);
        });

        sndKillerPersonalizado.volume = 0.95;
        sndKillerPersonalizado.play().catch(e => {
            playSound(sndWin, 0.8);
        });
    }

    // Escuchador del Modo Overlay Principal
    firebase.database().ref('modo_overlay').on('value', (snapshot) => {
        const d = snapshot.val();
        if(!d) { 
            kStage.style.display = "none"; kStage.innerHTML = ""; 
            stage.style.display = "none"; stage.innerHTML = "";
            return; 
        }
        
        if(d.modo === 'killer') {
            stage.style.display = "none"; 
            kStage.style.display = "block"; 
            
            if (d.estado === 'girando' && d.indiceActual === 0) {
                kStage.innerHTML = "";
            }

            if (d.secuencia && typeof d.indiceActual === 'number') {
                const totalCartas = d.secuencia.length;
                
                if (d.estado === 'girando') {
                    const killerNombre = d.secuencia[d.indiceActual];
                    const nuevaCarta = crearCartaBarajado(killerNombre, d.indiceActual, totalCartas);
                    kStage.appendChild(nuevaCarta);
                    
                    const todas = kStage.querySelectorAll('.killer-shuffle-card');
                    if(todas.length > 5) { todas[0].remove(); }

                    playSound(sndTick, 0.45);
                } 
                else if (d.estado === 'finalizado') {
                    kStage.innerHTML = "";
                    
                    const ganadorNombre = d.secuencia[d.indiceActual];
                    const cartaGanadora = crearCartaBarajado(ganadorNombre, 999, totalCartas);
                    
                    cartaGanadora.classList.remove('shuffling');
                    cartaGanadora.classList.add('winner-reveal');
                    
                    kStage.appendChild(cartaGanadora);
                    
                    setTimeout(() => {
                        cartaGanadora.classList.add('flipped');
                        playSound(sndFlip, 0.9);
                        dispararEfectoMorado();
                    }, 150);

                    setTimeout(() => {
                        reproducirSonidoKiller(ganadorNombre);
                    }, 550);
                }
            }
        } else if(d.modo === 'killer_vote') {
            kStage.style.display = "none";
            kStage.innerHTML = "";
            stage.style.display = "block";

            firebase.database().ref('killer_vote_data').once('value', (kvSnap) => {
                const kvData = kvSnap.val();
                if(!kvData) return;

                if(d.estado === "votando") {
                    stage.innerHTML = "";
                    ['A', 'B', 'C'].forEach(letra => {
                        const c = document.createElement('div');
                        c.className = `card pile-vote-visible-${letra}`; 
                        // SOLUCIÓN: Metemos .votos-tag adentro del contenedor .front para que herede la orientación correcta al derecho
                        c.innerHTML = `
                            <div class="side back"><div class="dbd-logo-bg"><img src="imag/dbd.png"></div><span class="back-letter">${letra}</span></div>
                            <div class="side front">
                                <div class="perk-icon-large"><img src="${getKillerUrl(kvData['killer' + letra])}" onerror="this.src='imag/dbd.png'"></div>
                                <div class="perk-title-large">${kvData['killer' + letra]}</div>
                                <div class="votos-tag">Votos: ${kvData[`votos${letra}`]||0}</div>
                            </div>
                        `;
                        stage.appendChild(c);
                    });
                } else if(d.estado === "finalizado") {
                    stage.innerHTML = "";
                    const ganadorNombre = d.ganadorNombre;
                    
                    const c = document.createElement('div');
                    c.className = `card pile-vote-visible-${d.ganadora}`;
                    c.innerHTML = `
                        <div class="side back"><div class="dbd-logo-bg"><img src="imag/dbd.png"></div><span class="back-letter">${d.ganadora}</span></div>
                        <div class="side front">
                            <div class="perk-icon-large"><img src="${getKillerUrl(ganadorNombre)}" onerror="this.src='imag/dbd.png'"></div>
                            <div class="perk-title-large">${ganadorNombre}</div>
                        </div>
                    `;
                    stage.appendChild(c);
                    
                    setTimeout(() => {
                        c.className = "card reveal-killer-win";
                        playSound(sndFlip, 0.9);
                        
                        kStage.style.display = "block";
                        dispararEfectoMorado();
                    }, 400);

                    setTimeout(() => {
                        reproducirSonidoKiller(ganadorNombre);
                    }, 800);
                }
            });
        } else if(d.modo === 'builds') {
            kStage.style.display = "none";
            kStage.innerHTML = "";
            stage.style.display = "block";
        }
    });

    // Escuchador en Tiempo Real de Modificaciones de Votos para Votaciones Activas
    firebase.database().ref('killer_vote_data').on('value', (snapshot) => {
        const kvData = snapshot.val();
        if(!kvData) return;

        stage.querySelectorAll('.card').forEach(c => {
            if(c.classList.contains('pile-vote-visible-A')) {
                const tag = c.querySelector('.votos-tag');
                if(tag) tag.innerText = `Votos: ${kvData.votosA || 0}`;
            }
            if(c.classList.contains('pile-vote-visible-B')) {
                const tag = c.querySelector('.votos-tag');
                if(tag) tag.innerText = `Votos: ${kvData.votosB || 0}`;
            }
            if(c.classList.contains('pile-vote-visible-C')) {
                const tag = c.querySelector('.votos-tag');
                if(tag) tag.innerText = `Votos: ${kvData.votosC || 0}`;
            }
        });
    });

    // Escuchador de Perks original
    firebase.database().ref('builds_data').on('value', (snapshot) => {
        const d = snapshot.val();
        if(!d) return;
        
        stage.style.display = "block";
        if(d.estado === "votando") {
            stage.innerHTML = "";
            ['A', 'B', 'C'].forEach(letra => {
                for(let i = 0; i < 4; i++) {
                    const c = document.createElement('div');
                    c.className = `card pile-${letra}-${i}`;
                    c.innerHTML = `<div class="side back"><div class="dbd-logo-bg"><img src="imag/dbd.png"></div><span class="back-letter">${letra}</span></div>`;
                    if(i === 3) c.innerHTML += `<div class="votos-tag">Votos: ${d[`votos${letra}`]||0}</div>`;
                    stage.appendChild(c);
                }
            });
        } else if(d.estado === "finalizado") {
            stage.innerHTML = "";
            const lasPerks = d[`opcion${d.ganadora}`] || [];
            
            lasPerks.forEach((perk, index) => {
                const c = document.createElement('div');
                c.className = `card pile-${d.ganadora}-${index}`;
                c.innerHTML = `
                    <div class="side back"><div class="dbd-logo-bg"><img src="imag/dbd.png"></div><span class="back-letter">${d.ganadora}</span></div>
                    <div class="side front">
                        <div class="perk-icon-large"><img src="${getPerkUrl(perk)}" onerror="this.src='imag/dbd.png'"></div>
                        <div class="perk-title-large">${perk}</div>
                    </div>
                `;
                stage.appendChild(c);
                
                setTimeout(() => { 
                    c.classList.remove(`pile-${d.ganadora}-${index}`); 
                    c.classList.add(`reveal-${index}`); 
                    playSound(sndFlip, 0.75); 
                }, index * 1000 + 400);
            });
            
            setTimeout(() => { 
                playSound(sndWin, 0.8); 
            }, 400);
        }
    });
</script>
</body>
</html>

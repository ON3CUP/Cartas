<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crupier de Perks - Control</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 12px; width: 420px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; }
        label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; display: block; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-bottom: 8px; transition: 0.2s; }
        .btn-build { background: #2563eb; color: white; }
        .btn-build:hover { background: #1d4ed8; }
        .btn-build-survi { background: #0284c7; color: white; }
        .btn-build-survi:hover { background: #0369a1; }
        .btn-action { background: #10b981; color: white; }
        .btn-action:hover { background: #059669; }
        .btn-killer { background: #7c3aed; color: white; }
        .btn-killer:hover { background: #6d28d9; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        
        .build-option { background: #161616; border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .build-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .votos-badge { background: #ea580c; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        
        .perks-list { margin: 0; padding-left: 20px; font-size: 13px; color: #ccc; line-height: 1.6; }
        .perks-list.oculto { color: #555; font-style: italic; list-style-type: none; padding-left: 5px; }
        
        .vote-controls { display: flex; gap: 8px; margin-top: 10px; }
        .btn-vote { background: #222; border: 1px solid #444; color: white; padding: 6px; font-size: 11px; }
        .btn-vote:hover { background: #333; }
        
        input[type="text"], select { width: 100%; padding: 10px; background: #161616; border: 1px solid #333; border-radius: 6px; color: white; box-sizing: border-box; margin-bottom: 10px; font-size: 13px; }
        select { cursor: pointer; }
        
        #killer-monitor { background: #1a102f; border: 1px solid #4c1d95; border-radius: 8px; padding: 15px; margin-top: 15px; text-align: center; }
        .killer-status-title { font-size: 11px; color: #a78bfa; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 5px; }
        .killer-detected-name { font-size: 22px; font-weight: 900; color: #c084fc; text-shadow: 0 0 10px rgba(168,85,247,0.4); text-transform: uppercase; }
        .killer-detected-name.final { color: #10b981; text-shadow: 0 0 10px rgba(16,185,129,0.4); animation: pulseGreen 1s infinite alternate; }

        @keyframes pulseGreen {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <audio id="ctrl-snd-flip" src="sounds/card-flip.mp3" preload="auto"></audio>

        }

        if (modeData.modo === 'builds_survi') {
            lbl.innerText = modeData.estado === 'votando' ? "🗳️ Votando Perks de Survi" : "🎉 Perks Survi Listas";
            nameEl.innerText = modeData.estado === 'votando' ? "MAZOS EN CHAT" : "REVELANDO EN STREAM";
            nameEl.className = modeData.estado === 'finalizado' ? "killer-detected-name final" : "killer-detected-name";
            return;
        }

        if (modeData.modo !== 'killer') {
            lbl.innerText = "Estado: En espera / Inactivo"; nameEl.innerText = "---";
            nameEl.className = "killer-detected-name"; return;
        }

        if (modeData.secuencia && typeof modeData.indiceActual === 'number') {
            const killerActual = modeData.secuencia[modeData.indiceActual];
            if (modeData.estado === 'girando') {
                lbl.innerText = "⚡ Ruleta Girando..."; nameEl.innerText = killerActual;
                nameEl.className = "killer-detected-name";
            } else if (modeData.estado === 'finalizado') {
                lbl.innerText = "🎉 ¡KILLER SELECCIONADO GANADOR!"; nameEl.innerText = killerActual;
                nameEl.className = "killer-detected-name final";
            }
        }
    });

    // Modificaciones Atómicas de Votos
    function modificarVotoKiller(o, c) {
        buildsKillerRef.child(`votos${o}`).transaction((cv) => { let v = (cv || 0) + c; return v < 0 ? 0 : v; });
    }
    function modificarVotoSurvi(o, c) {
        buildsSurviRef.child(`votos${o}`).transaction((cv) => { let v = (cv || 0) + c; return v < 0 ? 0 : v; });
    }
    function modificarVotoManualKiller(o, c) {
        killerVoteRef.child(`votos${o}`).transaction((cv) => { let v = (cv || 0) + c; return v < 0 ? 0 : v; });
    }

    // Funciones de Lógica Killer Perks
    function generarNuevasBuildsKiller() {
        usuariosQueVotaron.clear();
        buildsSurviRef.set(null); killerVoteRef.set(null);
        const shuf = () => [...listaPerksKiller].sort(() => 0.5 - Math.random()).slice(0, 4);
        buildsKillerRef.set({
            opcionA: shuf(), opcionB: shuf(), opcionC: shuf(),
            votosA: 0, votosB: 0, votosC: 0, ganadora: "", estado: "votando"
        }).then(() => { overlayModeRef.set({ modo: 'builds_killer', estado: 'votando' }); });
    }
    function eleccionAleatoriaKiller() {
        if (!localKillerData) return;
        overlayModeRef.update({ modo: 'builds_killer', estado: 'finalizado' });
        buildsKillerRef.update({ ganadora: ['A', 'B', 'C'][Math.floor(Math.random() * 3)], estado: "finalizado" });
    }
    function fijarGanadorVotacionKiller() {
        if (!localKillerData) return;
        overlayModeRef.update({ modo: 'builds_killer', estado: 'finalizado' });
        const v = [localKillerData.votosA || 0, localKillerData.votosB || 0, localKillerData.votosC || 0];
        buildsKillerRef.update({ ganadora: ['A', 'B', 'C'][v.indexOf(Math.max(...v))], estado: "finalizado" });
    }

    // Funciones de Lógica Survi Perks
    function generarNuevasBuildsSurvi() {
        usuariosQueVotaron.clear();
        buildsKillerRef.set(null); killerVoteRef.set(null);
        const shuf = () => [...listaPerksSurvi].sort(() => 0.5 - Math.random()).slice(0, 4);
        buildsSurviRef.set({
            opcionA: shuf(), opcionB: shuf(), opcionC: shuf(),
            votosA: 0, votosB: 0, votosC: 0, ganadora: "", estado: "votando"
        }).then(() => { overlayModeRef.set({ modo: 'builds_survi', estado: 'votando' }); });
    }
    function eleccionAleatoriaSurvi() {
        if (!localSurviData) return;
        overlayModeRef.update({ modo: 'builds_survi', estado: 'finalizado' });
        buildsSurviRef.update({ ganadora: ['A', 'B', 'C'][Math.floor(Math.random() * 3)], estado: "finalizado" });
    }
    function fijarGanadorVotacionSurvi() {
        if (!localSurviData) return;
        overlayModeRef.update({ modo: 'builds_survi', estado: 'finalizado' });
        const v = [localSurviData.votosA || 0, localSurviData.votosB || 0, localSurviData.votosC || 0];
        buildsSurviRef.update({ ganadora: ['A', 'B', 'C'][v.indexOf(Math.max(...v))], estado: "finalizado" });
    }

    // Votaciones e integración Manual Killers
    function generarVotacionKillers() {
        usuariosQueVotaron.clear(); buildsKillerRef.set(null); buildsSurviRef.set(null);
        const kA = document.getElementById('select-killer-A').value;
        const kB = document.getElementById('select-killer-B').value;
        const kC = document.getElementById('select-killer-C').value;
        killerVoteRef.set({ killerA: kA, killerB: kB, killerC: kC, votosA: 0, votosB: 0, votosC: 0 })
        .then(() => { overlayModeRef.set({ modo: 'killer_vote', estado: 'votando' }); });
    }
    function fijarGanadorKillerVotacion() {
        if (!localManualKillerData) return;
        const v = [localManualKillerData.votosA || 0, localManualKillerData.votosB || 0, localManualKillerData.votosC || 0];
        const letras = ['A', 'B', 'C']; const ganadora = letras[v.indexOf(Math.max(...v))];
        overlayModeRef.set({ modo: 'killer_vote', estado: 'finalizado', ganadora: ganadora, ganadorNombre: localManualKillerData[`killer${ganadora}`] });
    }
    function comenzarRuletaKiller() {
        usuariosQueVotaron.clear(); killerVoteRef.set(null); buildsKillerRef.set(null); buildsSurviRef.set(null);
        const mix = [...listaKillers].sort(() => 0.5 - Math.random());
        const totalGiros = 40 + Math.floor(Math.random() * 10);
        const secuencia = [];
        for (let i = 0; i < totalGiros; i++) { secuencia.push(mix[i % mix.length]); }
        let idx = 0; overlayModeRef.set({ modo: 'killer', estado: 'girando', secuencia: secuencia, indiceActual: idx });
        const interval = setInterval(() => {
            idx++;
            if (idx < secuencia.length - 1) { overlayModeRef.update({ indiceActual: idx }); } 
            else { clearInterval(interval); overlayModeRef.update({ estado: 'finalizado', indiceActual: secuencia.length - 1 }); }
        }, 50);
    }

    function limpiarTodo() {
        usuariosQueVotaron.clear(); buildsKillerRef.set(null); buildsSurviRef.set(null); killerVoteRef.set(null); overlayModeRef.set(null);
    }

    // Conexión Chat Twitch Inteligente
    function conectarTwitchManual() { const canal = document.getElementById('twitch-channel-input').value.trim().toLowerCase(); ejecutarConexionTwitch(canal); }
    function ejecutarConexionTwitch(canal) {
        if (!canal) return;
        if (twitchSocket) { try { twitchSocket.close(); } catch(e){} }
        const statusEl = document.getElementById('twitch-status');
        statusEl.innerText = "Conectando..."; statusEl.style.color = "#eab308"; 
        twitchSocket = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
        twitchSocket.onopen = () => {
            twitchSocket.send('PASS oauth:111111111111111111111111111111');
            twitchSocket.send('NICK justinfan84729'); twitchSocket.send(`JOIN #${canal}`);
        };
        twitchSocket.onmessage = (event) => {
            const msgRaw = event.data;
            if (msgRaw.startsWith('PING')) { twitchSocket.send('PONG :tmi.twitch.tv'); return; }
            if (msgRaw.includes(':tmi.twitch.tv 366') || msgRaw.includes('JOIN')) { statusEl.innerText = `Conectado a: ${canal}`; statusEl.style.color = "#10b981"; return; }
            const match = msgRaw.match(/:([^!]+)![^@]+@[^ ]+ PRIVMSG #[^ ]+ :(.+)/);
            if (match) {
                const usuario = match[1].toLowerCase(); const textoChat = match[2].trim().toUpperCase();
                if (['A', 'B', 'C'].includes(textoChat)) {
                    if (!currentModo || currentEstado !== 'votando') return;
                    if (usuariosQueVotaron.has(usuario)) return;
                    
                    usuariosQueVotaron.add(usuario);
                    if (currentModo === 'builds_killer') { modificarVotoKiller(textoChat, 1); } 
                    else if (currentModo === 'builds_survi') { modificarVotoSurvi(textoChat, 1); } 
                    else if (currentModo === 'killer_vote') { modificarVotoManualKiller(textoChat, 1); }
                }
            }
        };
        twitchSocket.onerror = () => { statusEl.innerText = "Error de red"; statusEl.style.color = "#dc2626"; };
        twitchSocket.onclose = () => { if (statusEl.innerText === "Conectando...") { statusEl.innerText = "Desconectado"; statusEl.style.color = "#888"; } };
    }
</script>

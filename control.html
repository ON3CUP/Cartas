<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crupier de Perks - Control</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 12px; width: 420px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; display: block; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-bottom: 8px; transition: 0.2s; }
        .btn-build { background: #2563eb; color: white; }
        .btn-build:hover { background: #1d4ed8; }
        .btn-action { background: #10b981; color: white; }
        .btn-action:hover { background: #059669; }
        .btn-killer { background: #7c3aed; color: white; }
        .btn-killer:hover { background: #6d28d9; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        
        .build-option { background: #161616; border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .build-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .votos-badge { background: #ea580c; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        
        .perks-list { margin: 0; padding-left: 20px; font-size: 13px; color: #ccc; line-height: 1.6; }
        .perks-list.oculto { color: #555; font-style: italic; list-style-type: none; padding-left: 5px; }
        
        .vote-controls { display: flex; gap: 8px; margin-top: 10px; }
        .btn-vote { background: #222; border: 1px solid #444; color: white; padding: 6px; font-size: 11px; }
        .btn-vote:hover { background: #333; }
        
        input[type="text"] { width: 100%; padding: 10px; background: #161616; border: 1px solid #333; border-radius: 6px; color: white; box-sizing: border-box; margin-bottom: 10px; font-size: 13px; }
        
        #killer-monitor { background: #1a102f; border: 1px solid #4c1d95; border-radius: 8px; padding: 15px; margin-top: 15px; text-align: center; }
        .killer-status-title { font-size: 11px; color: #a78bfa; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 5px; }
        .killer-detected-name { font-size: 22px; font-weight: 900; color: #c084fc; text-shadow: 0 0 10px rgba(168,85,247,0.4); text-transform: uppercase; }
        .killer-detected-name.final { color: #10b981; text-shadow: 0 0 10px rgba(16,185,129,0.4); animation: pulseGreen 1s infinite alternate; }

        @keyframes pulseGreen {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <audio id="ctrl-snd-flip" src="sounds/card-flip.mp3" preload="auto"></audio>
    <audio id="ctrl-snd-tick" src="sounds/roulette-tick.mp3" preload="auto"></audio>

    <div class="card">
        <label>Control de Votaciones (Perks)</label>
        <button class="btn-build" onclick="generarNuevasBuilds()">1. Generar Opciones A, B, C</button>
        <button class="btn-action" onclick="fijarGanadorVotacion()">2. Declarar Ganador por Votos</button>
        <button class="btn-action" onclick="eleccionAleatoria()">2. Elección Aleatoria (Cualquiera)</button>
        <button class="btn-danger" onclick="limpiarBuilds()">Recoger / Ocultar Todo</button>
        
        <div style="margin-top:20px;">
            <div class="build-option" id="box-A">
                <div class="build-title">Mazo A <span class="votos-badge" id="votos-badge-A">0 v</span></div>
                <ul class="perks-list" id="list-A"></ul>
                <div class="vote-controls">
                    <button class="btn-vote" onclick="modificarVoto('A', 1)">+1 Voto</button>
                    <button class="btn-vote" onclick="modificarVoto('A', -1)">-1 Voto</button>
                </div>
            </div>
            <div class="build-option" id="box-B">
                <div class="build-title">Mazo B <span class="votos-badge" id="votos-badge-B">0 v</span></div>
                <ul class="perks-list" id="list-B"></ul>
                <div class="vote-controls">
                    <button class="btn-vote" onclick="modificarVoto('B', 1)">+1 Voto</button>
                    <button class="btn-vote" onclick="modificarVoto('B', -1)">-1 Voto</button>
                </div>
            </div>
            <div class="build-option" id="box-C">
                <div class="build-title">Mazo C <span class="votos-badge" id="votos-badge-C">0 v</span></div>
                <ul class="perks-list" id="list-C"></ul>
                <div class="vote-controls">
                    <button class="btn-vote" onclick="modificarVoto('C', 1)">+1 Voto</button>
                    <button class="btn-vote" onclick="modificarVoto('C', -1)">-1 Voto</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <label>Ruleta de Asesinos (Killers)</label>
        <button class="btn-killer" onclick="comenzarRuletaKiller()">Lanzar Ruleta de Killer</button>
        
        <div id="killer-monitor">
            <div class="killer-status-title" id="monitor-label">Estado: En espera</div>
            <div class="killer-detected-name" id="monitor-name">---</div>
        </div>

        <label style="margin-top: 25px;">Integración de Chat (Twitch)</label>
        <input type="text" id="twitch-channel-input" placeholder="TuCanalDeTwitch">
        <button class="btn-action" onclick="conectarTwitchManual()">Conectar Chat de Votos</button>
        <div id="twitch-status" style="font-size:12px; color:#888; text-align:center; margin-top:5px;">Desconectado</div>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    firebase.initializeApp({databaseURL: "https://dbd-overlay-default-rtdb.firebaseio.com"});
    const buildsRef = firebase.database().ref('builds_data');
    const overlayModeRef = firebase.database().ref('modo_overlay');

    const cSndFlip = document.getElementById('ctrl-snd-flip');
    const cSndTick = document.getElementById('ctrl-snd-tick');

    function playCtrlSound(audioNode, vol = 0.4) {
        if(!audioNode) return;
        audioNode.volume = vol;
        audioNode.currentTime = 0;
        audioNode.play().catch(e => {});
    }

    let localData = null;
    let twitchSocket = null;
    let usuariosQueVotaron = new Set();

    const listaPerks = [
        "Acaparadora", "Acechador de ciervos", "Acecho letal", "Acogida nefasta", "Agarre del dragón", "Agitación", "Aliento", "Amigos para siempre", "Anatomía superior", "Aprendizaje de máquina", 
        "Apretón de hierro", "Arma definitiva", "Arrogancia tenebrosa", "Avería", "Barbacoa y chile", "Bestia de presa", "Brutalidad veloz", "Carnicero chapucero", "Codicia humana", "Coulrofobia", 
        "Depredación", "Desasosiego", "Desconcierto", "Deslumbrado", "Devoción oscura", "Discordancia", "Disolución", "Dominación", "Doncella de hierro", "Duda impuesta", "Eco sangriento", 
        "Empleo disponible", "Enfurecimiento", "Erupción", "Esperanza destruida", "Espías de las sombras", "Fuerza brutal", "Furia ciega", "Furia espiritual", "Gancho flagelante: Brújula cerrada", 
        "Gancho flagelante: Dolor retumbante", "Gancho flagelante: Heridas supurantes", "Gancho flagelante: Oleada de ira", "Gancho flagelante: Santuario monstruoso", "Gancho flagelante: Truco del verdugo", 
        "Golpe de gracia", "Guardián de sangre", "Hijo de la luz", "Hijo de las sombras", "Histeria", "Implacable", "Imposición de penitencia", "Imprevisto", "Incompleto", "Influencia", 
        "Insidia", "Instinto alienígena", "Instinto territorial", "Interruptor del hombre muerto", "Intervención corrupta", "Jugar con la comida", "Limitaciones genéticas", "Lo mejor para el final", 
        "Luz que agoniza", "Maleficio: Control de masas", "Maleficio: Destino desdichado", "Maleficio: Devoradora de esperanza", "Maleficio: Dos pueden jugar", "Maleficio: El tercer sello", 
        "Maleficio: Enfréntate a la oscuridad", "Maleficio: Favor de sangre", "Maleficio: Inmortal", "Maleficio: La emoción de la caza", "Maleficio: Mente colmena", "Maleficio: Nadie escapa de la muerte", 
        "Maleficio: Nana de cazadora", "Maleficio: Obertura del mal", "Maleficio: Pentimento", "Maleficio: Represalias", "Maleficio: Ruina", "Maleficio: Solo hay miseria", "Maleficio: Tierra embrujada", 
        "Maleficio: Títere de la fortuna", "Manitas", "Miedo fantasmal", "Mirada errante", "Monitorización y abuso", "Muerte de franklin", "Murmullo amargo", "Murmullos", "Nadie es libre", 
        "Noqueo", "Némesis", "Opresión", "Oscuridad expuesta", "Oído para la maquinaria", "Percepción activada", "Persecución furtiva", "Pilas incluidas", "Pim, pam, pum", "Presencia abrumadora", 
        "Presencia perturbadora", "Proyecto secreto", "Quebrantamentes", "Rastro de tormento", "Recuérdame", "Rencor", "Resistente", "Restricción cruel", "Retrasa el reloj", "Sabueso de sangre", 
        "Salmuera", "Separación", "Sin descanso", "Sin escapatoria", "Sin escondite", "Sintonía con la urdimbre", "Soberbia", "Sobrecarga", "Sobretensión", "Soy todo oídos", "Supervisión", 
        "Tanatofobia", "Temblores trepidantes", "Terminal", "Terror contagioso", "Todo vale", "Toma una decisión", "Toque lánguido", "Toque séptico", "Tormenta vil", "Trueno ensordecedor", 
        "Tácticas de zanshin", "Unidos eternamente", "Veda abierta", "Vocación de enfermera", "Voraz", "Vínculo mortal", "¡Plaf!"
    ];

    const listaKillers = ["Adiestradora", "Animatronico", "Arponero", "Artista", "Bruja", "Caballero", "Canibal", "Cazadora", "Cenobita", "Cerda", "Cerebro", "Comerciante", "Demogorgon", "Desconocido", "Deterioro", "Doctor", "Draga", "Embaucador", "Enfermera", "Espectro", "Espiritu", "Ghostface", "Ghoul", "Goodguy", "Krasue", "Myers", "Legion", "Liche", "Mellizos", "Nemesis", "Oni", "Onryo", "Payaso",  "Pesadilla", "Plaga", "Primero", "Pueblerino", "Señor oscuro", "Singularidad", "Trampero", "Verdugo", "Xenoformo", "Jason"];

    buildsRef.on('value', (snapshot) => {
        localData = snapshot.val();
        if (!localData) {
            document.getElementById('list-A').innerHTML = ''; document.getElementById('list-B').innerHTML = ''; document.getElementById('list-C').innerHTML = '';
            document.getElementById('votos-badge-A').innerText = '0 v'; document.getElementById('votos-badge-B').innerText = '0 v'; document.getElementById('votos-badge-C').innerText = '0 v';
            usuariosQueVotaron.clear();
            return;
        }

        document.getElementById('votos-badge-A').innerText = `${localData.votosA || 0} v`;
        document.getElementById('votos-badge-B').innerText = `${localData.votosB || 0} v`;
        document.getElementById('votos-badge-C').innerText = `${localData.votosC || 0} v`;

        ['A', 'B', 'C'].forEach(letra => {
            const listEl = document.getElementById(`list-${letra}`);
            const lasPerks = localData[`opcion${letra}`] || [];

            if (localData.estado === 'finalizado') {
                listEl.className = "perks-list";
                listEl.innerHTML = lasPerks.map(p => `<li>${p}</li>`).join('');
            } else {
                listEl.className = "perks-list oculto";
                listEl.innerHTML = `
                    <li>🔒 [ Perk Oculta ]</li>
                    <li>🔒 [ Perk Oculta ]</li>
                    <li>🔒 [ Perk Oculta ]</li>
                    <li>🔒 [ Perk Oculta ]</li>
                `;
            }
        });
    });

    overlayModeRef.on('value', (snapshot) => {
        const modeData = snapshot.val();
        const lbl = document.getElementById('monitor-label');
        const nameEl = document.getElementById('monitor-name');

        if (!modeData || modeData.modo !== 'killer') {
            lbl.innerText = "Estado: En espera / Inactivo";
            nameEl.innerText = "---";
            nameEl.className = "killer-detected-name";
            return;
        }

        if (modeData.secuencia && typeof modeData.indiceActual === 'number') {
            const killerActual = modeData.secuencia[modeData.indiceActual];
            
            if (modeData.estado === 'girando') {
                lbl.innerText = "⚡ Ruleta Girando... Pasando por:";
                nameEl.innerText = killerActual;
                nameEl.className = "killer-detected-name";
                playCtrlSound(cSndTick, 0.2);
            } 
            else if (modeData.estado === 'finalizado') {
                lbl.innerText = "🎉 ¡KILLER SELECCIONADO GANADOR!";
                nameEl.innerText = killerActual;
                nameEl.className = "killer-detected-name final";
                playCtrlSound(cSndFlip, 0.45);
            }
        }
    });

    function generarNuevasBuilds() {
        usuariosQueVotaron.clear();
        overlayModeRef.set({ modo: 'builds' });
        const shuf = () => [...listaPerks].sort(() => 0.5 - Math.random()).slice(0, 4);
        buildsRef.set({
            opcionA: shuf(), opcionB: shuf(), opcionC: shuf(),
            votosA: 0, votosB: 0, votosC: 0,
            ganadora: "", estado: "votando"
        });
    }

    function modificarVoto(o, c) {
        if (!localData) return;
        let v = (localData[`votos${o}`] || 0) + c;
        buildsRef.child(`votos${o}`).set(v < 0 ? 0 : v);
    }

    function eleccionAleatoria() {
        if (!localData) return;
        overlayModeRef.set({ modo: 'builds' });
        buildsRef.update({ ganadora: ['A', 'B', 'C'][Math.floor(Math.random() * 3)], estado: "finalizado" });
    }

    function fijarGanadorVotacion() {
        if (!localData) return;
        overlayModeRef.set({ modo: 'builds' });
        const v = [localData.votosA || 0, localData.votosB || 0, localData.votosC || 0];
        buildsRef.update({ ganadora: ['A', 'B', 'C'][v.indexOf(Math.max(...v))], estado: "finalizado" });
    }

    function limpiarBuilds() {
        buildsRef.set(null);
        overlayModeRef.set(null);
    }

    function comenzarRuletaKiller() {
        const mix = [...listaKillers].sort(() => 0.5 - Math.random());
        const totalGiros = 20 + Math.floor(Math.random() * 10);
        const secuencia = [];
        for (let i = 0; i < totalGiros; i++) {
            secuencia.push(mix[i % mix.length]);
        }

        let idx = 0;
        overlayModeRef.set({ modo: 'killer', estado: 'girando', secuencia: secuencia, indiceActual: idx });

        const interval = setInterval(() => {
            idx++;
            if (idx < secuencia.length - 1) {
                overlayModeRef.update({ indiceActual: idx });
            } else {
                clearInterval(interval);
                overlayModeRef.update({ estado: 'finalizado', indiceActual: secuencia.length - 1 });
            }
        }, 50);
    }

    function conectarTwitchManual() { 
        const canal = document.getElementById('twitch-channel-input').value.trim().toLowerCase();
        ejecutarConexionTwitch(canal); 
    }

    function ejecutarConexionTwitch(canal) {
        if (!canal) return;
        
        if (twitchSocket) {
            try { twitchSocket.close(); } catch(e){}
        }
        
        const statusEl = document.getElementById('twitch-status');
        statusEl.innerText = "Conectando...";
        statusEl.style.color = "#eab308"; 

        // Conexión IRC estándar y ultra compatible
        twitchSocket = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

        twitchSocket.onopen = () => {
            twitchSocket.send('PASS oauth:111111111111111111111111111111');
            twitchSocket.send('NICK justinfan84729');
            twitchSocket.send(`JOIN #${canal}`);
        };

        twitchSocket.onmessage = (event) => {
            const msgRaw = event.data;

            if (msgRaw.startsWith('PING')) {
                twitchSocket.send('PONG :tmi.twitch.tv');
                return;
            }

            if (msgRaw.includes(':tmi.twitch.tv 366') || msgRaw.includes('JOIN')) {
                statusEl.innerText = `Conectado a: ${canal}`;
                statusEl.style.color = "#10b981"; 
                return;
            }

            const match = msgRaw.match(/:([^!]+)![^@]+@[^ ]+ PRIVMSG #[^ ]+ :(.+)/);
            if (match) {
                const usuario = match[1].toLowerCase();
                const textoChat = match[2].trim().toUpperCase();

                if (!localData || localData.estado !== "votando" || usuariosQueVotaron.has(usuario)) return;
                
                if (['A', 'B', 'C'].includes(textoChat)) {
                    usuariosQueVotaron.add(usuario);
                    modificarVoto(textoChat, 1);
                }
            }
        };

        twitchSocket.onerror = () => {
            statusEl.innerText = "Error de red";
            statusEl.style.color = "#dc2626";
        };

        twitchSocket.onclose = () => {
            if (statusEl.innerText === "Conectando...") {
                statusEl.innerText = "Desconectado";
                statusEl.style.color = "#888";
            }
        };
    }
</script>
</body>
</html>
